<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FOLIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-mark">▲</span>
        <span class="logo-text">FOLIO</span>
      </div>
      <span class="project-count" id="projectCount">2 PROJECTS</span>
    </div>
  </header>

  <main class="main">

    <div class="hero">
      <h1 class="hero-title">PROJECTS</h1>
      <p class="hero-sub">HTML / CSS / JS 기반 프로젝트 모음</p>
    </div>

    <div class="card-grid" id="cardGrid">

      <a class="project-card" href="dashboard/index.html" target="_blank">
        <div class="card-visual" style="--card-color: #7c6ef2; --card-color-soft: rgba(124,110,242,0.12);">
          <span class="card-num">01</span>
        </div>
        <div class="card-body">
          <h2 class="card-title">투자 대시보드</h2>
          <p class="card-desc">Google Sheets 연동 ETF/주식 포트폴리오 현황 대시보드. 자산 배분, 손익 분석, 투자 노트 기능 포함.</p>
          <div class="card-tags">
            <span class="tag">HTML</span>
            <span class="tag">CSS</span>
            <span class="tag">JS</span>
            <span class="tag">Google Sheets</span>
            <span class="tag">Chart.js</span>
          </div>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <a class="project-card" href="etf-analysis/index.html" target="_blank">
        <div class="card-visual" style="--card-color: #4fa3e0; --card-color-soft: rgba(79,163,224,0.12);">
          <span class="card-num">02</span>
        </div>
        <div class="card-body">
          <h2 class="card-title">ETF 분석</h2>
          <p class="card-desc">티커를 입력하면 ETF 구성종목 비중을 막대 차트와 테이블로 시각화하는 분석 도구.</p>
          <div class="card-tags">
            <span class="tag">HTML</span>
            <span class="tag">CSS</span>
            <span class="tag">JS</span>
            <span class="tag">Chart.js</span>
          </div>
        </div>
        <span class="card-arrow">→</span>
      </a>

    </div>
  </main>

</body>
</html>
