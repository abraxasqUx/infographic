<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>복리 계산기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="../theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="../index.html" class="back-link">← 포트폴리오</a>
      <div class="header-right">
        <span class="header-title">COMPOUND CALC</span>
        <button class="theme-toggle" id="themeToggle" title="테마 전환">
          <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main">

    <div class="hero">
      <h1 class="hero-title">복리 계산기</h1>
      <p class="hero-sub">주식 투자 복리 수익 시뮬레이터 · 3-시나리오 비교</p>
    </div>

    <div class="layout">

      <!-- ── 입력 패널 ── -->
      <aside class="input-panel">

        <div class="input-section">
          <h3 class="section-label">기본 설정</h3>
          <div class="input-group">
            <label for="initialAmount">초기 투자금</label>
            <div class="input-wrap">
              <input type="number" id="initialAmount" value="10000000" min="0" step="1000000" />
              <span class="unit">원</span>
            </div>
          </div>
          <div class="input-group">
            <label for="monthlyContrib">월 납입금</label>
            <div class="input-wrap">
              <input type="number" id="monthlyContrib" value="500000" min="0" step="100000" />
              <span class="unit">원</span>
            </div>
          </div>
          <div class="input-group">
            <label for="years">투자 기간</label>
            <div class="input-wrap">
              <input type="number" id="years" value="20" min="1" max="50" step="1" />
              <span class="unit">년</span>
            </div>
          </div>
        </div>

        <div class="input-section">
          <h3 class="section-label">수익률 / 세금 설정</h3>
          <div class="input-group">
            <label for="annualReturn">연간 수익률</label>
            <div class="input-wrap">
              <input type="number" id="annualReturn" value="10" min="-50" max="100" step="0.5" />
              <span class="unit">%</span>
            </div>
          </div>
          <div class="input-group">
            <label for="taxRate">세율 <span class="hint">(수익에 적용)</span></label>
            <div class="input-wrap">
              <input type="number" id="taxRate" value="22" min="0" max="100" step="0.1" />
              <span class="unit">%</span>
            </div>
          </div>
          <div class="input-group">
            <label for="inflationRate">물가상승률</label>
            <div class="input-wrap">
              <input type="number" id="inflationRate" value="2.5" min="0" max="20" step="0.1" />
              <span class="unit">%</span>
            </div>
          </div>
        </div>

        <div class="input-section">
          <h3 class="section-label">목표 금액 역산 <span class="optional">선택</span></h3>
          <div class="input-group">
            <label for="targetAmount">목표 금액</label>
            <div class="input-wrap">
              <input type="number" id="targetAmount" value="" min="0" step="10000000" placeholder="미입력 시 생략" />
              <span class="unit">원</span>
            </div>
          </div>
          <div class="reverse-result" id="reverseResult"></div>
        </div>

      </aside>

      <!-- ── 요약 카드 + 차트 + 테이블 ── -->
      <div class="results">

        <div class="summary-cards" id="summaryCards"></div>

        <div class="chart-box">
          <div class="chart-header">
            <span class="chart-title">세후 투자 성장 시뮬레이션</span>
            <span class="chart-sub" id="chartSub"></span>
          </div>
          <canvas id="growthChart"></canvas>
        </div>

        <div class="table-section">
          <div class="table-header">
            <div class="scenario-tabs" id="scenarioTabs">
              <button class="tab-btn" data-idx="0">비관</button>
              <button class="tab-btn active" data-idx="1">기준</button>
              <button class="tab-btn" data-idx="2">낙관</button>
            </div>
            <span class="table-note">단위: 원</span>
          </div>
          <div class="table-wrap">
            <table id="resultsTable">
              <thead>
                <tr>
                  <th>연도</th>
                  <th>연간 납입</th>
                  <th>투자 수익</th>
                  <th>연말 잔액</th>
                  <th>세후 잔액</th>
                  <th>실질 가치</th>
                  <th>누적 수익률</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
