<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <script src="../theme.js"></script>
</head>
<body>

  <!-- Lock Screen -->
  <div class="lock-screen" id="lockScreen">
    <div class="lock-inner">
      <div class="lock-logo">
        <span class="logo-mark">▲</span>
        <span class="logo-text">FOLIO</span>
      </div>
      <p class="lock-sub">PIN을 입력하세요</p>
      <div class="pin-dots" id="pinDots">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>
      <div class="pin-error" id="pinError"></div>
      <div class="numpad">
        <button class="num-btn" data-n="1">1</button>
        <button class="num-btn" data-n="2">2</button>
        <button class="num-btn" data-n="3">3</button>
        <button class="num-btn" data-n="4">4</button>
        <button class="num-btn" data-n="5">5</button>
        <button class="num-btn" data-n="6">6</button>
        <button class="num-btn" data-n="7">7</button>
        <button class="num-btn" data-n="8">8</button>
        <button class="num-btn" data-n="9">9</button>
        <div></div>
        <button class="num-btn" data-n="0">0</button>
        <button class="num-btn num-btn--del" id="delBtn">⌫</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-mark">▲</span>
        <span class="logo-text">FOLIO</span>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="themeToggle" title="테마 전환">
          <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <span class="sync-status" id="syncStatus">
          <span class="sync-dot"></span>
          <span id="syncLabel">데이터 로딩 중...</span>
        </span>
        <button class="refresh-btn" id="refreshBtn" title="새로고침">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
        <span class="last-updated" id="lastUpdated">—</span>
        <button class="lock-btn" id="lockBtn" title="대기화면">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          대기화면
        </button>
      </div>
    </div>
  </header>

  <main class="main">

      <!-- Summary Cards -->
      <section class="summary-grid">
        <div class="card card--primary">
          <div class="card-label">총 평가금액</div>
          <div class="card-value" id="totalValue">—</div>
          <div class="card-sub" id="totalValueUSD">—</div>
        </div>
        <div class="card">
          <div class="card-label">총 투자원금</div>
          <div class="card-value" id="totalInvested">—</div>
        </div>
        <div class="card">
          <div class="card-label">평가손익</div>
          <div class="card-value" id="totalPnl">—</div>
          <div class="card-sub" id="totalPnlPct">—</div>
        </div>
        <div class="card">
          <div class="card-label">보유 종목 수</div>
          <div class="card-value" id="holdingCount">—</div>
        </div>
      </section>

      <!-- Charts Row -->
      <section class="charts-grid">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">자산 배분</span>
            <div class="toggle-group" id="pieToggle">
              <button class="toggle-btn active" data-type="category">자산군</button>
              <button class="toggle-btn" data-type="ticker">종목</button>
            </div>
          </div>
          <div class="chart-wrap">
            <canvas id="pieChart"></canvas>
            <div class="chart-legend" id="pieLegend"></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">자산군별 현황</span>
          </div>
          <div class="category-list" id="categoryList"></div>
        </div>
      </section>

      <!-- Holdings Table -->
      <section class="panel">
        <div class="panel-header">
          <span class="panel-title">보유 종목</span>
          <div class="panel-filters">
            <select class="filter-select" id="accountFilter">
              <option value="전체">전체 계좌</option>
            </select>
            <div class="toggle-group" id="categoryFilter">
              <button class="toggle-btn active" data-cat="전체">전체</button>
              <button class="toggle-btn" data-cat="국내주식">국내</button>
              <button class="toggle-btn" data-cat="해외주식">해외</button>
              <button class="toggle-btn" data-cat="예수금">예수금</button>
            </div>
          </div>
        </div>
        <div class="table-wrap">
          <table class="holdings-table">
            <thead>
              <tr>
                <th>계좌별</th>
                <th>종목명</th>
                <th>구분</th>
                <th>매입 총액</th>
                <th>평가 총액</th>
                <th>수익률</th>
                <th>비중 (계좌내)</th>
              </tr>
            </thead>
            <tbody id="holdingsBody"></tbody>
          </table>
        </div>
      </section>

      <!-- Notes -->
      <section class="panel">
        <div class="panel-header">
          <span class="panel-title">투자 노트</span>
          <div class="panel-filters">
            <select class="filter-select" id="noteFilter">
              <option value="전체">전체</option>
            </select>
            <button class="add-note-btn" id="addNoteBtn">+ 노트 추가</button>
          </div>
        </div>
        <div class="note-form" id="noteForm" style="display:none;">
          <div class="note-form-inner">
            <select class="note-input note-select" id="noteTicker">
              <option value="">종목 선택 (선택 안 하면 전체 메모)</option>
            </select>
            <input class="note-input" type="text" id="noteTitle" placeholder="제목" />
            <textarea class="note-input note-textarea" id="noteContent" placeholder="내용을 입력하세요..."></textarea>
            <div class="note-form-actions">
              <button class="btn-cancel" id="cancelNote">취소</button>
              <button class="btn-save" id="saveNote">저장</button>
            </div>
          </div>
        </div>
        <div class="notes-list" id="notesList"></div>
      </section>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="sheets.js"></script>
  <script src="app.js"></script>
</body>
</html>
